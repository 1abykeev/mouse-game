<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;family=Be_Vietnam_Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "outline": "#646dc8",
                  "error": "#ff6e84",
                  "outline-variant": "#353e97",
                  "secondary-fixed": "#3fff8b",
                  "secondary-fixed-dim": "#24f07e",
                  "surface-container-high": "#000873",
                  "primary-fixed-dim": "#edc600",
                  "primary-dim": "#edc600",
                  "on-tertiary": "#481900",
                  "tertiary-fixed": "#ff955e",
                  "background": "#000341",
                  "surface-container-lowest": "#000000",
                  "on-primary": "#635200",
                  "tertiary-fixed-dim": "#ff7f36",
                  "on-surface": "#e3e3ff",
                  "on-tertiary-fixed-variant": "#642600",
                  "primary-container": "#fdd400",
                  "on-primary-fixed-variant": "#645300",
                  "inverse-primary": "#715d00",
                  "on-tertiary-fixed": "#2f0e00",
                  "tertiary-dim": "#ff7520",
                  "on-primary-container": "#594a00",
                  "on-secondary-fixed": "#004820",
                  "on-error-container": "#ffb2b9",
                  "on-secondary-container": "#e3ffe4",
                  "error-container": "#a70138",
                  "surface-variant": "#000b84",
                  "on-background": "#e3e3ff",
                  "on-error": "#490013",
                  "surface-tint": "#ffe483",
                  "on-surface-variant": "#9ba4ff",
                  "error-dim": "#d73357",
                  "surface-container-highest": "#000b84",
                  "on-secondary-fixed-variant": "#006832",
                  "surface-bright": "#000e96",
                  "tertiary-container": "#fd6c00",
                  "on-tertiary-container": "#321000",
                  "surface-container": "#000662",
                  "surface": "#000341",
                  "inverse-on-surface": "#434ca5",
                  "inverse-surface": "#fbf8ff",
                  "on-secondary": "#005d2c",
                  "secondary-container": "#006d35",
                  "secondary-dim": "#24f07e",
                  "primary-fixed": "#fdd400",
                  "secondary": "#3fff8b",
                  "surface-container-low": "#000450",
                  "tertiary": "#ff833f",
                  "primary": "#ffe483",
                  "on-primary-fixed": "#433700",
                  "surface-dim": "#000341"
          },
          "borderRadius": {
                  "DEFAULT": "1rem",
                  "lg": "2rem",
                  "xl": "3rem",
                  "full": "9999px"
          },
          "fontFamily": {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Be Vietnam Pro"],
                  "label": ["Plus Jakarta Sans"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
    }
    .game-canvas {
      background: radial-gradient(circle at center, #000873 0%, #000341 100%);
      overflow: hidden;
      position: relative;
    }
    .star-field {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
        radial-gradient(1px 1px at 150px 50px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 100px 150px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 200px 250px, #ffe483, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 300px 300px;
      opacity: 0.4;
    }
    .rocket-container {
      filter: drop-shadow(0 0 15px rgba(255, 228, 131, 0.4));
    }
  </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen overflow-hidden">
<!-- Top Navigation Shell (Fixed HUD) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#000341]/60 backdrop-blur-xl rounded-b-3xl shadow-[0_10px_30px_rgba(255,228,131,0.1)]">
<div class="flex items-center gap-4">
<div class="text-2xl font-black text-yellow-400 uppercase font-headline tracking-wide">
        Mouse Masters
      </div>
</div>
<!-- Game Stats Bento HUD -->
<div class="flex items-center gap-6 bg-surface-container-high/40 px-6 py-2 rounded-full border-4 border-outline-variant/20">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="rocket">rocket</span>
<span class="font-headline font-bold text-primary tracking-tight">2.5km</span>
</div>
<div class="h-6 w-px bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" data-icon="stars" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-headline font-bold text-primary-container tracking-tight">50</span>
</div>
<div class="h-6 w-px bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="speed">speed</span>
<span class="font-headline font-bold text-secondary tracking-tight">FAST</span>
</div>
</div>
<div class="flex items-center gap-3">
<button class="text-white/70 hover:scale-105 hover:brightness-110 transition-all active:scale-95">
<span class="material-symbols-outlined text-2xl" data-icon="timer">timer</span>
</button>
<button class="text-white/70 hover:scale-105 hover:brightness-110 transition-all active:scale-95">
<span class="material-symbols-outlined text-2xl" data-icon="favorite">favorite</span>
</button>
</div>
</header>
<!-- Main Game Canvas -->
<main class="game-canvas h-screen w-full flex items-center justify-center pt-24 pb-28">
<div class="star-field"></div>
<!-- Left Navigation Hint -->
<div class="fixed left-8 top-1/2 -translate-y-1/2 z-20 flex flex-col items-center gap-4 group">
<div class="w-16 h-16 rounded-full bg-surface-bright/20 backdrop-blur-md flex items-center justify-center border-4 border-primary/30 shadow-[0_0_20px_rgba(255,228,131,0.2)]">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="mouse">mouse</span>
</div>
<span class="font-headline font-extrabold text-primary text-xs uppercase tracking-widest opacity-60 group-hover:opacity-100 transition-opacity">Left Click</span>
</div>
<!-- Right Navigation Hint -->
<div class="fixed right-8 top-1/2 -translate-y-1/2 z-20 flex flex-col items-center gap-4 group">
<div class="w-16 h-16 rounded-full bg-surface-bright/20 backdrop-blur-md flex items-center justify-center border-4 border-primary/30 shadow-[0_0_20px_rgba(255,228,131,0.2)]">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="mouse">mouse</span>
</div>
<span class="font-headline font-extrabold text-primary text-xs uppercase tracking-widest opacity-60 group-hover:opacity-100 transition-opacity">Right Click</span>
</div>
<!-- Gameplay Area -->
<div class="relative w-full max-w-6xl h-full flex items-center px-12">
<!-- The Rocket -->
<div class="rocket-container absolute left-24 top-1/3 flex items-center">
<div class="relative">
<div class="w-48 h-24 bg-surface-container-highest rounded-full flex items-center justify-end pr-4 border-b-8 border-outline-variant">
<div class="w-12 h-12 rounded-full bg-primary-container border-4 border-on-primary-fixed-variant"></div>
</div>
<!-- Rocket Exhaust -->
<div class="absolute -left-12 top-1/2 -translate-y-1/2 flex gap-1">
<div class="w-8 h-4 bg-tertiary rounded-full blur-[2px]"></div>
<div class="w-12 h-8 bg-tertiary-container rounded-full blur-[4px]"></div>
</div>
</div>
</div>
<!-- Obstacles: Asteroids -->
<div class="absolute right-32 top-1/4">
<div class="w-32 h-32 bg-surface-container-high rounded-[2rem] transform rotate-12 flex items-center justify-center shadow-[inset_-10px_-10px_20px_rgba(0,0,0,0.5)] border-4 border-outline-variant/30">
<div class="w-6 h-6 rounded-full bg-surface-container-lowest/40 absolute top-4 left-6"></div>
<div class="w-4 h-4 rounded-full bg-surface-container-lowest/40 absolute bottom-8 right-6"></div>
</div>
</div>
<div class="absolute right-12 top-2/3">
<div class="w-20 h-20 bg-surface-container-high rounded-full transform -rotate-12 flex items-center justify-center shadow-[inset_-5px_-5px_15px_rgba(0,0,0,0.5)] border-4 border-outline-variant/30">
<div class="w-4 h-4 rounded-full bg-surface-container-lowest/40 absolute top-3 left-4"></div>
</div>
</div>
<div class="absolute right-64 bottom-1/4">
<div class="w-16 h-16 bg-surface-container-high rounded-lg transform rotate-45 flex items-center justify-center shadow-[inset_-5px_-5px_15px_rgba(0,0,0,0.5)] border-4 border-outline-variant/30"></div>
</div>
</div>
<!-- Game Over Overlay -->
<div class="absolute inset-0 z-50 flex items-center justify-center bg-background/80 backdrop-blur-sm">
<div class="bg-surface-container-low p-12 rounded-xl border-t-8 border-error-container shadow-[0_20px_50px_rgba(0,0,0,0.8)] max-w-md w-full text-center flex flex-col gap-8">
<div class="space-y-2">
<h1 class="font-headline text-5xl font-black text-error uppercase tracking-tighter italic">Game Over</h1>
<p class="font-body text-on-surface-variant font-bold">You flew 2.5km into the unknown!</p>
</div>
<div class="bg-surface-container-highest rounded-lg p-6 flex justify-around">
<div class="text-center">
<span class="block text-xs uppercase font-headline font-black text-outline">Distance</span>
<span class="text-2xl font-black text-primary">2,514m</span>
</div>
<div class="w-px bg-outline-variant/30"></div>
<div class="text-center">
<span class="block text-xs uppercase font-headline font-black text-outline">Coins</span>
<span class="text-2xl font-black text-primary-container">50</span>
</div>
</div>
<div class="flex flex-col gap-4">
<button class="bg-primary text-on-primary py-5 rounded-full font-headline font-black text-xl shadow-[0_6px_0_#645300] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="replay">replay</span>
            TRY AGAIN
          </button>
<button class="bg-surface-bright text-on-surface py-5 rounded-full font-headline font-black text-xl shadow-[0_6px_0_#000873] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="home">home</span>
            HOME
          </button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-4 bg-[#000341]/80 backdrop-blur-2xl rounded-t-[3rem] h-24 shadow-[0_-10px_40px_rgba(0,3,65,0.5)]">
<div class="flex flex-col items-center justify-center bg-lime-400 text-[#000341] rounded-full p-4 transform -translate-y-4 shadow-[0_0_20px_rgba(163,230,53,0.6)] active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Be_Vietnam_Pro'] font-bold text-sm">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-white/60 p-2 hover:text-white transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
<span class="font-['Be_Vietnam_Pro'] font-bold text-sm">Progress</span>
</div>
<div class="flex flex-col items-center justify-center text-white/60 p-2 hover:text-white transition-colors active:scale-90">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Be_Vietnam_Pro'] font-bold text-sm">Settings</span>
</div>
</nav>
</body></html>
