<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&amp;family=Be+Vietnam+Pro:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "primary-fixed-dim": "#edc600",
                  "on-error-container": "#ffb2b9",
                  "primary": "#ffe483",
                  "surface-tint": "#ffe483",
                  "secondary-dim": "#24f07e",
                  "on-primary-fixed": "#433700",
                  "secondary-container": "#006d35",
                  "primary-container": "#fdd400",
                  "surface-container-lowest": "#000000",
                  "tertiary-fixed": "#ff955e",
                  "surface-container-low": "#000450",
                  "on-secondary": "#005d2c",
                  "on-tertiary": "#481900",
                  "tertiary": "#ff833f",
                  "on-primary": "#635200",
                  "inverse-on-surface": "#434ca5",
                  "secondary-fixed": "#3fff8b",
                  "on-surface-variant": "#9ba4ff",
                  "on-primary-fixed-variant": "#645300",
                  "tertiary-dim": "#ff7520",
                  "inverse-primary": "#715d00",
                  "surface-container-highest": "#000b84",
                  "outline": "#646dc8",
                  "surface-container-high": "#000873",
                  "outline-variant": "#353e97",
                  "on-tertiary-fixed-variant": "#642600",
                  "on-tertiary-container": "#321000",
                  "on-surface": "#e3e3ff",
                  "surface-dim": "#000341",
                  "on-tertiary-fixed": "#2f0e00",
                  "on-primary-container": "#594a00",
                  "secondary-fixed-dim": "#24f07e",
                  "on-secondary-fixed-variant": "#006832",
                  "on-secondary-container": "#e3ffe4",
                  "tertiary-container": "#fd6c00",
                  "error": "#ff6e84",
                  "tertiary-fixed-dim": "#ff7f36",
                  "on-background": "#e3e3ff",
                  "error-container": "#a70138",
                  "surface": "#000341",
                  "primary-fixed": "#fdd400",
                  "surface-container": "#000662",
                  "secondary": "#3fff8b",
                  "background": "#000341",
                  "inverse-surface": "#fbf8ff",
                  "error-dim": "#d73357",
                  "on-error": "#490013",
                  "primary-dim": "#edc600",
                  "surface-variant": "#000b84",
                  "surface-bright": "#000e96",
                  "on-secondary-fixed": "#004820"
          },
          "borderRadius": {
                  "DEFAULT": "1rem",
                  "lg": "2rem",
                  "xl": "3rem",
                  "full": "9999px"
          },
          "fontFamily": {
                  "headline": ["Plus Jakarta Sans"],
                  "body": ["Be Vietnam Pro"],
                  "label": ["Plus Jakarta Sans"]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .maze-grid {
      background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.1) 1px, transparent 0);
      background-size: 40px 40px;
    }
    .glass-panel {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-secondary selection:text-on-secondary min-h-screen overflow-hidden">
<!-- TopAppBar Component -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#000341]/60 backdrop-blur-xl rounded-b-[2rem] shadow-[0_10px_30px_rgba(255,228,131,0.1)]">
<div class="flex items-center gap-4">
<div class="text-2xl font-black text-yellow-400 drop-shadow-[0_2px_0_rgba(253,212,0,0.5)] font-headline">Mouse Masters</div>
<div class="h-8 w-[2px] bg-white/10 hidden md:block"></div>
<div class="hidden md:flex gap-6 font-headline font-bold text-lg tracking-wide">
<span class="text-yellow-400 scale-110 cursor-pointer transition-transform hover:scale-105">Play</span>
<span class="text-white/70 cursor-pointer transition-transform hover:scale-105">Quests</span>
<span class="text-white/70 cursor-pointer transition-transform hover:scale-105">Leaderboard</span>
</div>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 bg-surface-container-highest px-4 py-2 rounded-full border-2 border-primary/20 shadow-inner">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-headline font-extrabold text-primary">1,240</span>
</div>
<div class="flex gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface-container-high text-white/70 hover:scale-105 transition-transform">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface-container-high text-white/70 hover:scale-105 transition-transform">
<span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
</div>
</div>
</header>
<!-- Main Game Canvas -->
<main class="relative w-full h-screen pt-24 pb-32 px-4 flex flex-col items-center">
<!-- Game HUD: Score, Stage, Timer, Hearts -->
<div class="w-full max-w-4xl flex flex-wrap justify-between items-center gap-4 mb-6 z-10 px-4">
<div class="flex gap-4">
<!-- Score Card -->
<div class="bg-surface-container-low/80 glass-panel rounded-lg px-6 py-3 flex flex-col border-b-4 border-primary/30">
<span class="text-xs uppercase tracking-widest font-bold text-primary/60">Score</span>
<span class="text-2xl font-black text-primary font-headline tracking-tighter">120</span>
</div>
<!-- Stage Card -->
<div class="bg-surface-container-low/80 glass-panel rounded-lg px-6 py-3 flex flex-col border-b-4 border-secondary/30">
<span class="text-xs uppercase tracking-widest font-bold text-secondary/60">Stage</span>
<span class="text-2xl font-black text-secondary font-headline tracking-tighter">2/5</span>
</div>
</div>
<div class="flex items-center gap-6">
<!-- Timer Display -->
<div class="flex items-center gap-3 bg-surface-container-highest rounded-full px-6 py-3 border-2 border-white/5">
<span class="material-symbols-outlined text-tertiary" data-icon="schedule">schedule</span>
<span class="text-xl font-extrabold text-on-surface font-headline">0:45</span>
</div>
<!-- Hearts -->
<div class="flex gap-2">
<span class="material-symbols-outlined text-error text-3xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="material-symbols-outlined text-error text-3xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="material-symbols-outlined text-error text-3xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
</div>
<!-- Maze Environment -->
<div class="relative flex-1 w-full max-w-5xl bg-[#87CEEB] rounded-xl overflow-hidden shadow-[0_0_80px_rgba(0,0,0,0.5)] border-8 border-surface-container-highest maze-grid">
<!-- Decorative Sky Elements -->
<div class="absolute top-10 left-10 w-24 h-12 bg-white/40 rounded-full blur-xl"></div>
<div class="absolute top-40 right-20 w-32 h-16 bg-white/30 rounded-full blur-2xl"></div>
<div class="absolute bottom-20 left-1/4 w-40 h-20 bg-white/20 rounded-full blur-3xl"></div>
<!-- Maze Walls (Obstacles) -->
<div class="absolute inset-0 p-8 grid grid-cols-10 grid-rows-8 gap-1">
<!-- Row 1 -->
<div class="col-start-3 col-span-2 row-start-1 bg-surface-container-high rounded-sm border-b-4 border-black/20 shadow-lg flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover mix-blend-overlay" data-alt="textured gray stone brick wall background with realistic shadows and cracks for an ancient castle feel" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWjzHyWcmJUhvgidiJiPG9mrIHqtiXa68s5BIuqsho-I_FMC0ndHoNHyhQKLC6Lf7a4Nt2F_Lfh1KaYJzbe5eSLsecMG4ApImOLULuD63HCcravmYoto7BiE_aKQlwWu8RKQcVTiMKPpRIZhC_OiQiPHQTOXOAf-KtVjvXiLlaDOK4coe2Ys6L95m0esHihgTI8hYx0enxgNhkugfOIuYzEI6v_7pZWlk-MWhkPUO26OnvRsDG4dTn1mqhxn-yRStoYcKpSz_WcHA"/>
</div>
<div class="col-start-7 col-span-3 row-start-1 bg-surface-container-high rounded-sm border-b-4 border-black/20 shadow-lg"></div>
<!-- Row 3-4 -->
<div class="col-start-2 col-span-1 row-start-3 row-span-3 bg-surface-container-high rounded-sm border-b-4 border-black/20 shadow-lg"></div>
<div class="col-start-5 col-span-4 row-start-3 bg-surface-container-high rounded-sm border-b-4 border-black/20 shadow-lg"></div>
<div class="col-start-9 col-span-1 row-start-4 row-span-4 bg-surface-container-high rounded-sm border-b-4 border-black/20 shadow-lg"></div>
<!-- Row 6 -->
<div class="col-start-4 col-span-3 row-start-6 bg-surface-container-high rounded-sm border-b-4 border-black/20 shadow-lg"></div>
<div class="col-start-1 col-span-2 row-start-7 bg-surface-container-high rounded-sm border-b-4 border-black/20 shadow-lg"></div>
</div>
<!-- Start Position: Mouse Mascot -->
<div class="absolute top-12 left-12 group cursor-grab active:cursor-grabbing">
<div class="relative w-20 h-20 flex items-center justify-center animate-bounce">
<div class="absolute inset-0 bg-primary/30 blur-xl rounded-full group-hover:bg-primary/50 transition-colors"></div>
<div class="relative w-16 h-16 bg-primary rounded-full border-4 border-on-primary shadow-xl overflow-hidden flex items-center justify-center">
<img class="w-12 h-12 object-contain" data-alt="cute cartoon mouse with big round ears and a friendly smile, vibrant 3D style character portrait" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA4OuHYW52ex37zaXRWXXP6ZnzZBgu2EWUlev7dy1pedNp5j2etsZaCYCtb7SNKO-44i9dyCgxExRok4TfwpuVYRS76S__uZufDKq8yL7NINhTr4FSKTkg6Y50t5q1XmOixErVU2ScDhxszzjHfL3RbI34tW4_JnGk8BZUeJPWk_hs9JjCr4m0ax3dQJqu560ic5POSjf1EMqkJvrI07qWbYlz9PgmI7NK9HF5bNvxo3-T4zXLBDcEcQPqoE1epZXLXNqCHpiF19y4"/>
</div>
<!-- Drag Indicator -->
<div class="absolute -bottom-8 bg-white text-[#000341] font-bold text-[10px] px-2 py-1 rounded-full shadow-md uppercase tracking-tighter">Drag Me!</div>
</div>
</div>
<!-- Goal Position: Chicken Snack -->
<div class="absolute bottom-12 right-12">
<div class="relative w-24 h-24 flex items-center justify-center">
<div class="absolute inset-0 bg-tertiary/40 blur-2xl rounded-full animate-pulse"></div>
<div class="relative w-16 h-16 bg-surface-container-highest rounded-xl border-4 border-tertiary-fixed shadow-[0_10px_0_#fd6c00] flex items-center justify-center rotate-3">
<img class="w-12 h-12 object-contain" data-alt="delicious bucket of golden fried chicken wings, stylized 3d render food item for kids game" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgQ_M8i-kO_9RtfXfcckdf499oXTy8HCHsuMbbA_97-Rh3NhZcuQ1dvmBwBPtxn1IXOuBrv3AmtigadszD9jRfXtLlbJbgW5_lTVz6tG3mSKHEO2ZWG0dBP24DCuab5a-bT1eQibfxpKmm9AyoWdrV9vcgPlPK2Is3tqeraih0fs-MRSXCassbEnphOMonhwCXhsY8vBOgQMM6_atqP9Nss_uEfKoT641axR8xsMLp_n7HdsMxfbj-PIK34KH2YvKWwVDh1vbnWfY"/>
</div>
<div class="absolute -top-4 -right-4 w-10 h-10 bg-secondary rounded-full flex items-center justify-center border-2 border-white text-[#000341] font-black text-xs shadow-lg">XP</div>
</div>
</div>
<!-- Path Visualizer (Dashed line) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none opacity-20">
<path d="M 80 80 Q 200 120 280 250 T 500 400 T 800 500" fill="transparent" stroke="#000" stroke-dasharray="10,10" stroke-width="4"></path>
</svg>
</div>
<!-- Title Overlay -->
<div class="absolute top-1/2 -translate-y-1/2 pointer-events-none opacity-10">
<h1 class="text-9xl font-black font-headline uppercase tracking-tighter text-white/20 select-none">MOUSE MAZE</h1>
</div>
<!-- Bottom Actions -->
<div class="w-full max-w-4xl flex justify-between items-center mt-8 z-10">
<button class="group flex items-center gap-4 bg-error-container/30 hover:bg-error-container/50 px-8 py-4 rounded-xl border-b-8 border-error-dim transition-all active:translate-y-1 active:border-b-4">
<span class="material-symbols-outlined text-error text-3xl group-hover:scale-125 transition-transform" data-icon="help_center">help_center</span>
<span class="font-headline font-black text-2xl tracking-tight text-white uppercase">HELP!</span>
</button>
<button class="group flex items-center gap-4 bg-secondary-container px-10 py-4 rounded-xl border-b-8 border-on-secondary-fixed-variant transition-all active:translate-y-1 active:border-b-4">
<span class="material-symbols-outlined text-secondary text-3xl group-hover:rotate-12 transition-transform" data-icon="shopping_bag">shopping_bag</span>
<span class="font-headline font-black text-2xl tracking-tight text-white uppercase">STORE</span>
</button>
</div>
</main>
<!-- BottomNavBar Component -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-end pb-8 pt-4 px-4 bg-[#000341]/80 backdrop-blur-2xl rounded-t-[3rem] border-t-4 border-white/5 shadow-[0_-15px_40px_rgba(0,3,65,0.8)]">
<a class="flex flex-col items-center justify-center bg-[#ccff00] text-[#000341] rounded-[2rem] px-6 py-2 shadow-[0_4px_0_#a3cc00] -translate-y-2 transition-transform active:scale-90 group" href="#">
<span class="material-symbols-outlined text-3xl" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-['Be_Vietnam_Pro'] font-extrabold text-[12px] uppercase tracking-widest mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-white/60 px-6 py-2 hover:text-[#ccff00] hover:translate-y-[-2px] transition-all active:scale-90" href="#">
<span class="material-symbols-outlined text-3xl" data-icon="insights">insights</span>
<span class="font-['Be_Vietnam_Pro'] font-extrabold text-[12px] uppercase tracking-widest mt-1">Progress</span>
</a>
<a class="flex flex-col items-center justify-center text-white/60 px-6 py-2 hover:text-[#ccff00] hover:translate-y-[-2px] transition-all active:scale-90" href="#">
<span class="material-symbols-outlined text-3xl" data-icon="settings">settings</span>
<span class="font-['Be_Vietnam_Pro'] font-extrabold text-[12px] uppercase tracking-widest mt-1">Settings</span>
</a>
</nav>
<!-- Level Intro Modal (Decorative) -->
<div class="fixed inset-0 z-[100] bg-surface-dim/80 backdrop-blur-sm flex items-center justify-center pointer-events-none opacity-0 scale-95 select-none">
<div class="bg-surface-container-low p-12 rounded-lg border-4 border-primary shadow-[0_0_100px_rgba(255,228,131,0.2)] text-center">
<span class="text-primary font-headline font-black text-6xl block mb-4 italic">READY?</span>
<span class="text-white/60 font-body text-xl uppercase tracking-widest font-bold">Level 2: The Tasty Trail</span>
</div>
</div>
</body></html>
