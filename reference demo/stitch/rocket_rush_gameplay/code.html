<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rocket Rush - Galactic Whimsy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#fdd400",
                    "surface-container-lowest": "#000000",
                    "primary-fixed-dim": "#edc600",
                    "on-error-container": "#ffb2b9",
                    "secondary-dim": "#24f07e",
                    "on-primary-fixed": "#433700",
                    "secondary-container": "#006d35",
                    "primary": "#ffe483",
                    "surface-tint": "#ffe483",
                    "on-primary": "#635200",
                    "inverse-on-surface": "#434ca5",
                    "tertiary": "#ff833f",
                    "inverse-primary": "#715d00",
                    "secondary-fixed": "#3fff8b",
                    "on-surface-variant": "#9ba4ff",
                    "on-primary-fixed-variant": "#645300",
                    "tertiary-dim": "#ff7520",
                    "tertiary-fixed": "#ff955e",
                    "on-secondary": "#005d2c",
                    "on-tertiary": "#481900",
                    "surface-container-low": "#000450",
                    "surface-dim": "#000341",
                    "on-tertiary-container": "#321000",
                    "on-surface": "#e3e3ff",
                    "on-secondary-container": "#e3ffe4",
                    "tertiary-container": "#fd6c00",
                    "error": "#ff6e84",
                    "tertiary-fixed-dim": "#ff7f36",
                    "on-tertiary-fixed": "#2f0e00",
                    "on-primary-container": "#594a00",
                    "secondary-fixed-dim": "#24f07e",
                    "on-secondary-fixed-variant": "#006832",
                    "surface-container-high": "#000873",
                    "outline-variant": "#353e97",
                    "surface-container-highest": "#000b84",
                    "outline": "#646dc8",
                    "on-tertiary-fixed-variant": "#642600",
                    "inverse-surface": "#fbf8ff",
                    "error-dim": "#d73357",
                    "on-secondary-fixed": "#004820",
                    "on-error": "#490013",
                    "primary-dim": "#edc600",
                    "surface-variant": "#000b84",
                    "surface-bright": "#000e96",
                    "surface": "#000341",
                    "primary-fixed": "#fdd400",
                    "surface-container": "#000662",
                    "secondary": "#3fff8b",
                    "on-background": "#e3e3ff",
                    "error-container": "#a70138",
                    "background": "#000341"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .parallax-nebula {
            background: radial-gradient(circle at 20% 30%, #434ca5 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #000b84 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, #000341 0%, transparent 100%);
        }
        .star-field {
            background-image: radial-gradient(white, rgba(255,255,255,0) 2px);
            background-size: 100px 100px;
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface selection:bg-primary selection:text-on-primary overflow-hidden h-screen">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-8 py-4 bg-[#000341]/60 backdrop-blur-md rounded-b-[2rem] shadow-[0_10px_30px_rgba(255,228,131,0.1)]">
<div class="flex items-center gap-4">
<h1 class="text-2xl font-black text-yellow-400 italic font-headline tracking-tight">Rocket Rush</h1>
<div class="h-8 w-px bg-outline-variant mx-2 opacity-50"></div>
<!-- Game Stats Container -->
<div class="flex gap-6 items-center">
<div class="flex items-center gap-2 px-4 py-1.5 bg-surface-container rounded-full border-2 border-outline-variant">
<span class="material-symbols-outlined text-primary" data-icon="speed">speed</span>
<span class="text-sm font-bold font-headline uppercase tracking-wider text-primary">75 km/h</span>
</div>
<div class="flex items-center gap-2 px-4 py-1.5 bg-surface-container rounded-full border-2 border-outline-variant">
<span class="material-symbols-outlined text-primary-container" data-icon="monetization_on">monetization_on</span>
<span class="text-sm font-bold font-headline text-primary-container">45</span>
</div>
<div class="flex items-center gap-2 px-4 py-1.5 bg-surface-container rounded-full border-2 border-outline-variant">
<span class="material-symbols-outlined text-secondary" data-icon="explore">explore</span>
<span class="text-sm font-bold font-headline text-secondary">2,500m</span>
</div>
</div>
</div>
<div class="flex gap-4">
<button class="p-3 bg-surface-container-high rounded-full hover:scale-105 hover:brightness-110 transition-all active:scale-95 text-on-surface">
<span class="material-symbols-outlined" data-icon="pause">pause</span>
</button>
<button class="p-3 bg-surface-container-high rounded-full hover:scale-105 hover:brightness-110 transition-all active:scale-95 text-on-surface">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Game Canvas -->
<main class="relative h-screen w-full overflow-hidden parallax-nebula">
<!-- Background Decor -->
<div class="absolute inset-0 star-field opacity-30"></div>
<div class="absolute top-1/4 left-1/3 w-64 h-64 bg-tertiary-container/20 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-primary-container/10 rounded-full blur-[120px]"></div>
<!-- Left Guidance -->
<div class="absolute left-12 top-1/2 -translate-y-1/2 flex flex-col items-center gap-4 group">
<div class="w-24 h-24 rounded-full bg-surface-container/40 border-4 border-dashed border-primary/30 flex items-center justify-center glass-panel group-hover:border-primary/60 transition-colors">
<span class="material-symbols-outlined text-4xl text-primary/40 group-hover:text-primary transition-colors" data-icon="mouse_left_click">left_click</span>
</div>
<span class="font-headline font-extrabold text-primary/60 tracking-widest text-xs uppercase">LEFT CLICK</span>
</div>
<!-- Right Guidance -->
<div class="absolute right-12 top-1/2 -translate-y-1/2 flex flex-col items-center gap-4 group">
<div class="w-24 h-24 rounded-full bg-surface-container/40 border-4 border-dashed border-secondary/30 flex items-center justify-center glass-panel group-hover:border-secondary/60 transition-colors">
<span class="material-symbols-outlined text-4xl text-secondary/40 group-hover:text-secondary transition-colors" data-icon="mouse_right_click">right_click</span>
</div>
<span class="font-headline font-extrabold text-secondary/60 tracking-widest text-xs uppercase">RIGHT CLICK</span>
</div>
<!-- Side Scrolling Game Elements -->
<div class="relative h-full w-full flex items-center">
<!-- The Rocket -->
<div class="absolute left-[15%] top-[45%] flex items-center gap-1">
<!-- Flame -->
<div class="w-16 h-8 bg-tertiary rounded-l-full blur-sm opacity-80 flex justify-end items-center pr-2">
<div class="w-8 h-4 bg-primary rounded-l-full"></div>
</div>
<!-- Rocket Body -->
<div class="relative w-40 h-24 bg-surface-bright rounded-full border-4 border-outline shadow-[0_0_40px_rgba(100,109,200,0.4)] flex items-center justify-center">
<!-- Window -->
<div class="w-12 h-12 rounded-full bg-on-surface-variant/30 border-4 border-outline-variant flex items-center justify-center overflow-hidden">
<div class="w-full h-full bg-gradient-to-tr from-transparent via-white/10 to-white/30"></div>
</div>
<!-- Fins -->
<div class="absolute top-[-10px] right-8 w-8 h-8 bg-error rounded-tr-xl -rotate-12"></div>
<div class="absolute bottom-[-10px] right-8 w-8 h-8 bg-error rounded-br-xl rotate-12"></div>
</div>
</div>
<!-- Obstacles (Asteroids) -->
<div class="absolute right-[20%] top-[20%] w-32 h-28 bg-[#5d4037] rounded-[3rem] border-b-8 border-r-8 border-[#3e2723] shadow-xl flex flex-wrap gap-2 p-4">
<div class="w-4 h-4 rounded-full bg-[#3e2723]/40"></div>
<div class="w-6 h-6 rounded-full bg-[#3e2723]/40 ml-4"></div>
<div class="w-3 h-3 rounded-full bg-[#3e2723]/40 mt-2"></div>
</div>
<div class="absolute right-[-5%] top-[60%] w-48 h-40 bg-[#5d4037] rounded-[4rem] border-b-[12px] border-r-[12px] border-[#3e2723] shadow-2xl">
<div class="w-full h-full p-8 grid grid-cols-2 gap-4">
<div class="w-8 h-8 rounded-full bg-[#3e2723]/30"></div>
<div class="w-6 h-6 rounded-full bg-[#3e2723]/30"></div>
<div class="w-10 h-10 rounded-full bg-[#3e2723]/30"></div>
</div>
</div>
<!-- Pickups (Coins) -->
<div class="absolute left-[50%] top-[40%] flex gap-12">
<div class="w-12 h-12 bg-primary rounded-full border-4 border-primary-container shadow-[0_0_20px_#fdd400] flex items-center justify-center">
<span class="text-on-primary-container font-black text-xl">$</span>
</div>
<div class="w-12 h-12 bg-primary rounded-full border-4 border-primary-container shadow-[0_0_20px_#fdd400] flex items-center justify-center translate-y-12">
<span class="text-on-primary-container font-black text-xl">$</span>
</div>
<div class="w-12 h-12 bg-primary rounded-full border-4 border-primary-container shadow-[0_0_20px_#fdd400] flex items-center justify-center -translate-y-8">
<span class="text-on-primary-container font-black text-xl">$</span>
</div>
</div>
</div>
<!-- Quest Tray (Custom Component) -->
<div class="absolute bottom-28 left-1/2 -translate-x-1/2 w-[90%] max-w-4xl bg-surface-container-low/80 glass-panel rounded-lg p-6 shadow-2xl border-4 border-outline-variant/20">
<div class="flex justify-between items-center">
<div class="flex items-center gap-6">
<div class="relative">
<img class="w-16 h-16 rounded-2xl object-cover border-4 border-secondary" data-alt="cute cartoon pilot wearing a shiny silver space helmet with a green tinted visor, digital art style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDSJ704Wc-afJMH_R2x4GkjHoOwpqqtx9N8vJ6xR2edVn7JF9aNmilwAg3cbnDi-pX9nY-xBlXFyEfwfDWD53NfrRjk86MeR5jjV5GPQNa1brWdpr3EJhaBqnpoiXdLZb2TuXt9q87D1w_AuzCnkV84do3KZpplDbBcqqjQj-OwpIzT1DDdTW5DdC4QEyT4WCDI1zoPx_ilyDNgCabpQnVV93lT0dIYwcS6SLNNYZKkuVH3FvsxEHqwGd77lb786NdPSDMeRLuf-7o"/>
<div class="absolute -top-3 -right-3 w-8 h-8 bg-tertiary rounded-full flex items-center justify-center border-2 border-surface shadow-lg">
<span class="material-symbols-outlined text-sm font-bold" data-icon="priority_high">priority_high</span>
</div>
</div>
<div>
<h3 class="font-headline text-lg font-extrabold text-on-surface">Daily Mission: Asteroid Dodger</h3>
<p class="text-on-surface-variant font-medium">Avoid 20 obstacles to earn bonus Fuel Crystals!</p>
</div>
</div>
<div class="flex gap-4">
<div class="text-right">
<div class="text-xs font-headline font-black text-secondary tracking-widest uppercase mb-1">Progress</div>
<div class="w-48 h-4 bg-surface-container-highest rounded-full overflow-hidden border-2 border-outline-variant">
<div class="w-2/3 h-full bg-secondary shadow-[0_0_10px_#3fff8b]"></div>
</div>
</div>
<div class="w-px h-12 bg-outline-variant"></div>
<div class="flex flex-col items-center justify-center px-4">
<span class="text-primary font-black text-2xl leading-none">12/20</span>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-6 h-24 bg-[#000341]/80 backdrop-blur-xl rounded-t-[3rem] pb-safe shadow-2xl">
<!-- Mission (Active) -->
<a class="flex flex-col items-center justify-center bg-yellow-400 text-[#000341] rounded-[2rem] px-6 py-2 transform -translate-y-2 font-['Be_Vietnam_Pro'] font-bold text-sm hover:scale-105 transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="rocket_launch" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
<span>Mission</span>
</a>
<!-- Ship -->
<a class="flex flex-col items-center justify-center text-white/60 p-2 font-['Be_Vietnam_Pro'] font-bold text-sm hover:text-yellow-300 transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="settings_rocket">settings</span>
<span>Ship</span>
</a>
<!-- Upgrades -->
<a class="flex flex-col items-center justify-center text-white/60 p-2 font-['Be_Vietnam_Pro'] font-bold text-sm hover:text-yellow-300 transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="upgrade">upgrade</span>
<span>Upgrades</span>
</a>
<!-- Map -->
<a class="flex flex-col items-center justify-center text-white/60 p-2 font-['Be_Vietnam_Pro'] font-bold text-sm hover:text-yellow-300 transition-all" href="#">
<span class="material-symbols-outlined mb-1" data-icon="map">map</span>
<span>Map</span>
</a>
</nav>
<!-- Floating Action Button: Power Up -->
<div class="fixed bottom-28 right-8 z-40">
<button class="group flex items-center justify-center w-20 h-20 bg-tertiary rounded-full shadow-[0_12px_0_0_#fd6c00] hover:translate-y-1 hover:shadow-[0_8px_0_0_#fd6c00] active:translate-y-2 active:shadow-none transition-all">
<span class="material-symbols-outlined text-4xl text-on-tertiary group-hover:scale-110 transition-transform" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</button>
<div class="absolute -top-2 -right-2 bg-secondary text-on-secondary px-3 py-1 rounded-full text-xs font-black font-headline shadow-lg">3</div>
</div>
</body></html>
